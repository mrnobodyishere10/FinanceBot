name: AI Autonomous Repo Manager

on:
  issues:
    types: [opened]
  workflow_dispatch:

jobs:
  analyze-and-respond:
    runs-on: ubuntu-latest
    
    permissions:
      issues: write
      contents: read

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm install openai @octokit/rest

      - name: Execute AI Logic
        env:
          # Menggunakan Secret kustom Anda
          GITHUB_TOKEN: ${{ secrets.GITHU8_TOKEN }}
          
          # Konteks dinamis dari GitHub Event
          GITHUB_REPOSITORY: ${{ github.repository }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: node sample.js
