name: Autonomous AI Manager Workflow

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize]
  issues:
    types: [opened]
  workflow_dispatch:
    inputs:
      command:
        description: 'Perintah Manual untuk Oracle'
        required: false

jobs:
  oracle-core:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # WAJIB: Agar AI bisa memetakan seluruh sub-folder

      - name: Fetch PR Diff
        if: github.event_name == 'pull_request'
        run: git diff origin/${{ github.base_ref }} HEAD > pr.diff

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run Oracle Engine
        env:
          GITHUB_TOKEN: ${{ secrets.GITHU8_TOKEN }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          GITHUB_HEAD_REF: ${{ github.head_ref }}
          EVENT_BODY: ${{ github.event.issue.body || github.event.pull_request.body || github.event.head_commit.message }}
          MANUAL_COMMAND: ${{ github.event.inputs.command }}
        run: |
          npm install openai @octokit/rest axios
          # Memasukkan PR Diff ke variabel lingkungan jika ada
          if [ -f pr.diff ]; then export PR_DIFF=$(cat pr.diff); fi
          node sample.js
