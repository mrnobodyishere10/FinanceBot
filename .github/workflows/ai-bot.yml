name: AI Autonomous Manager

on:
  issues:
    types: [opened]
  pull_request:
    types: [opened]
  workflow_dispatch:

jobs:
  automation:
    runs-on: ubuntu-latest
    
    permissions:
      issues: write
      pull-requests: write
      contents: read

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        # Menginstal pustaka yang dibutuhkan
        run: npm install openai @octokit/rest

      - name: Run AI Manager
        env:
          # Secret kustom Anda
          GITHUB_TOKEN: ${{ secrets.GITHU8_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          
          # Logika pemisahan context ID
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          
          # Mengambil konten body dari event manapun yang terjadi
          EVENT_BODY: ${{ github.event.issue.body || github.event.pull_request.body }}
        run: node sample.js
