name: AI Interactive Assistant

on:
  issues:
    # Bot akan berjalan otomatis saat ada Issue baru dibuka
    types: [opened]
  # Menambahkan pemicu manual agar Anda bisa tes dari tab Actions jika perlu
  workflow_dispatch:

jobs:
  respond:
    runs-on: ubuntu-latest
    
    # Memberikan izin agar bot bisa menulis komentar dan memodifikasi Issue
    permissions:
      issues: write
      contents: read

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        # Menginstal openai dan @octokit/rest berdasarkan package.json
        run: npm install

      - name: Run Combined AI Bot
        env:
          # Menggunakan Secret kustom Anda untuk akses GitHub Models & API
          GITHUB_TOKEN: ${{ secrets.GITHU8_TOKEN }}
          
          # Variabel context untuk identifikasi lokasi dan isi Issue
          GITHUB_REPOSITORY: ${{ github.repository }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: node sample.js

