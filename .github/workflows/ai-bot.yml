name: Autonomous AI Manager Workflow

on:
  issue_comment:
    types: [created]
  pull_request:
    types: [opened, synchronize]
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      command:
        description: 'Input perintah bebas dari Telegram'
        required: false
      source:
        description: 'Identifikasi asal perintah'
        required: false

jobs:
  execute-autonomous:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event_name == 'pull_request' || github.event_name == 'push' || startsWith(github.event.comment.body, '/') }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch PR Diff
        if: github.event_name == 'pull_request'
        run: git diff origin/${{ github.base_ref }}...HEAD > pr.diff || true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm install openai @octokit/rest axios

      - name: Start Sovereign Engine
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          MANUAL_CMD: ${{ github.event.inputs.command || github.event.comment.body }}
          CMD_SOURCE: ${{ github.event.inputs.source || github.event_name }}
          GITHUB_EVENT_PATH: ${{ github.event_path }}
          ISSUE_NUMBER: ${{ github.event.issue.number || github.event.pull_request.number }}
        run: |
          if [ -f pr.diff ]; then export PR_DIFF=$(cat pr.diff); fi
          node sample.js
          
